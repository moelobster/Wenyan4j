name: Build and Test
on:
  workflow_call:
    inputs:
      ci_build:
        description: 'CI Build'
        required: true
        type: boolean
      pr_build:
        description: 'PR Build'
        required: true
        type: boolean
    secrets:
      maven_url:
        description: 'Maven URL'
        required: false
      maven_user:
        description: 'Maven User'
        required: false
      maven_pass:
        description: 'Maven Password'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOT_DEV: ${{ secrets.maven_url != '' && secrets.maven_user != '' && secrets.maven_pass != '' }}
      CI_BUILD: ${{ inputs.ci_build }}
      PR_BUILD: ${{ inputs.pr_build }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Java 21
        uses: actions/setup-java@v3.6.0
        with:
          distribution: zulu
          java-version: 21

      - name: make gradle wrapper executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Get Version
        id: version
        run: |
          MESSAGE=$(ls build/libs/* | grep slim.jar -v | awk -F 'wenyan4j-|-all.jar' '{print $2}')
          echo "version=$MESSAGE" >> $GITHUB_OUTPUT

      - name: capture build artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: "wenyan4j artifacts"
          path: build/libs/wenyan4j-${{ steps.version.outputs.version }}-all.jar

      - name: Publish to maven
        if: ${{ !inputs.pr_build && env.NOT_DEV == 'true' }}
        run: ./gradlew publish
        env:
          MAVEN_URL: ${{ secrets.maven_url }}
          MAVEN_USERNAME: ${{ secrets.maven_user }}
          MAVEN_PASSWORD: ${{ secrets.maven_pass }}
        continue-on-error: true

      - name: capture maven artifacts
        if: ${{ !inputs.pr_build && env.NOT_DEV == 'true' }}
        uses: actions/upload-artifact@v4.3.3
        with:
          name: "wenyan4j deploy"
          path: build/staging-deploy/

      - name: Upload Release Jar
        if: ${{ !inputs.ci_build && !inputs.pr_build }}
        uses: softprops/action-gh-release@v0.1.15
        with:
          files: |
            build/libs/wenyan4j-${{ steps.version.outputs.version }}-all.jar
