name: Publish to Maven Central
on:
  workflow_call:
    secrets:
      maven_central_username:
        description: 'Maven Central Username'
        required: true
      maven_central_password:
        description: 'Maven Central Password'
        required: true
      signing_key:
        description: 'Signing Key'
        required: true
      signing_public_key:
        description: 'Signing Public Key'
        required: true
      signing_password:
        description: 'Signing Password'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java 25
        uses: actions/setup-java@v3.6.0
        with:
          distribution: zulu
          java-version: 25

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Download built artifacts (fixed name)
        uses: actions/download-artifact@v4
        with:
          name: 'wenyan4j deploy'
          path: build/staging-deploy/

      - name: Publish to Maven Central
        run: ./gradlew jreleaserDeploy --no-configuration-cache
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.maven_central_username }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.maven_central_password }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.signing_key }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.signing_password }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.signing_public_key }}
